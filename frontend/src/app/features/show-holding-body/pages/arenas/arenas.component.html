<div class="arenas-page">
  <div class="page-header mb-4">
    <h2>Arenas Management</h2>
    <p class="text-muted">Manage arenas and venues for competitions</p>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
    <div class="toast" [class.show]="showToast" [class.bg-success]="toastType === 'success'" [class.bg-danger]="toastType === 'error'">
      <div class="toast-body text-white">
        <i class="ti" [class.ti-check]="toastType === 'success'" [class.ti-alert-circle]="toastType === 'error'" class="me-2"></i>
        {{ toastMessage }}
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div *ngIf="!loading" class="row">
    <div *ngFor="let arena of arenas" class="col-md-6 mb-4">
      <div class="card">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <h5 class="card-title mb-0">{{ arena.name }}</h5>
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" [checked]="arena.isActive" 
                (change)="toggleStatus(arena)" role="switch">
            </div>
          </div>
          <p class="text-muted">{{ arena.description }}</p>
          <div class="arena-details">
            <div class="detail-item">
              <i class="ti ti-ruler me-2"></i>
              <strong>Size:</strong> {{ arena.size }}
            </div>
            <div class="detail-item">
              <i class="ti ti-layers me-2"></i>
              <strong>Surface:</strong> {{ arena.surface }}
            </div>
            <div class="detail-item">
              <i class="ti ti-users me-2"></i>
              <strong>Capacity:</strong> {{ arena.capacity }} spectators
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
