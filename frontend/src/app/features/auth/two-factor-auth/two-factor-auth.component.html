<!-- Two-Factor Authentication Card -->
<div class="auth-card">
  <!-- Header -->
  <div class="auth-card-header">
    <div class="mb-3">
      <i class="ti ti-shield-lock text-primary" style="font-size: 3rem;"></i>
    </div>
    <h2>Two-Factor Authentication</h2>
    <p>Enter the 6-digit verification code sent to your device</p>
  </div>

  <!-- Error Alert -->
  <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
    <i class="ti ti-alert-circle me-2"></i>
    {{ errorMessage }}
    <button type="button" class="btn-close" (click)="errorMessage = ''" aria-label="Close"></button>
  </div>

  <!-- 2FA Form -->
  <form [formGroup]="twoFactorForm" (ngSubmit)="onSubmit()" class="auth-card-body">
    <!-- Code Field -->
    <div class="mb-4">
      <label for="code" class="form-label text-center d-block">Verification Code</label>
      <input
        type="text"
        class="form-control form-control-lg text-center code-input"
        id="code"
        formControlName="code"
        placeholder="000000"
        maxlength="6"
        (input)="onCodeInput($event)"
        [class.is-invalid]="hasError('code', 'required') || hasError('code', 'pattern')"
        autocomplete="off"
      />
      <div class="invalid-feedback text-center" *ngIf="hasError('code', 'required')">
        Verification code is required
      </div>
      <div class="invalid-feedback text-center" *ngIf="hasError('code', 'pattern')">
        Please enter a valid 6-digit code
      </div>
      <small class="form-text text-muted d-block text-center mt-2">
        Enter the 6-digit code from your authenticator app
      </small>
    </div>

    <!-- Submit Button -->
    <button
      type="submit"
      class="btn btn-primary w-100 btn-lg mb-3"
      [disabled]="loading"
    >
      <span *ngIf="!loading">
        <i class="ti ti-check me-2"></i>Verify Code
      </span>
      <span *ngIf="loading">
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        Verifying...
      </span>
    </button>

    <!-- Resend Code Link -->
    <div class="text-center">
      <button type="button" class="btn btn-link text-primary" (click)="resendCode()">
        <i class="ti ti-refresh me-1"></i>Resend Code
      </button>
    </div>
  </form>

  <!-- Footer -->
  <div class="auth-card-footer">
    <p>
      Having trouble?
      <a [routerLink]="['/auth/login']">Back to Login</a>
    </p>
  </div>
</div>
