<header class="header-main">
  <div class="container-fluid">
    <div class="row align-items-center">
      <div class="col-md-6 header-left">
        <div class="d-flex align-items-center gap-3">
          <div class="page-title">
            <h4 class="mb-0">Dashboard</h4>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <ul class="header-right d-flex align-items-center justify-content-end list-unstyled mb-0">
          <li class="me-3">
            <div class="search-box position-relative">
              <i class="bi bi-search position-absolute" style="left: 12px; top: 50%; transform: translateY(-50%);"></i>
              <input
                type="text"
                class="form-control form-control-sm"
                style="padding-left: 36px; width: 250px;"
                placeholder="Search...">
            </div>
          </li>

          <li class="me-2">
            <button class="btn btn-primary btn-sm">
              <i class="bi bi-upload me-1"></i>
              Upload
            </button>
          </li>

          <li class="dropdown">
            <button
              class="btn btn-link p-0 border-0"
              (click)="toggleUserMenu()"
              style="background: none;">
              @if (authService.currentUser(); as user) {
                <div class="user-avatar-sm">
                  {{ user.first_name.charAt(0) }}{{ user.last_name.charAt(0) }}
                </div>
              }
            </button>

            @if (showUserMenu) {
              <div class="dropdown-menu dropdown-menu-end show" style="position: absolute; right: 0; top: 100%; margin-top: 8px;">
                @if (authService.currentUser(); as user) {
                  <div class="dropdown-header">
                    <div class="fw-bold">{{ user.full_name }}</div>
                    <small class="text-muted">{{ user.email }}</small>
                  </div>
                }
                <div class="dropdown-divider"></div>
                <button class="dropdown-item" (click)="navigateToProfile()">
                  <i class="bi bi-person me-2"></i>
                  Profile
                </button>
                <button class="dropdown-item" (click)="navigateToSettings()">
                  <i class="bi bi-gear me-2"></i>
                  Settings
                </button>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item text-danger" (click)="logout()">
                  <i class="bi bi-box-arrow-right me-2"></i>
                  Logout
                </button>
              </div>
            }
          </li>
        </ul>
      </div>
    </div>
  </div>
</header>
