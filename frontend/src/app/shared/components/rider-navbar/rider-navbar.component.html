<nav class="rider-navbar">
  <div class="navbar-container">
    <!-- Logo Section -->
    <div class="navbar-brand">
      <div class="logo-icon">
        <i class="bi bi-trophy-fill"></i>
      </div>
      <span class="brand-name">DSRiding</span>
    </div>

    <!-- Navigation Menu -->
    <ul class="nav-menu">
      @for (item of navItems; track item.route) {
        <li class="nav-item">
          <a 
            [routerLink]="item.route" 
            routerLinkActive="active"
            [routerLinkActiveOptions]="{exact: false}"
            class="nav-link">
            <i class="bi {{ item.icon }}"></i>
            <span>{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>

    <!-- User Menu -->
    <div class="navbar-user">
      <button 
        class="user-menu-trigger" 
        (click)="toggleUserMenu()">
        @if (authService.currentUser(); as user) {
          <div class="user-avatar">
            {{ user.first_name.charAt(0) }}{{ user.last_name.charAt(0) }}
          </div>
          <span class="user-name">{{ user.first_name }}</span>
          <i class="bi bi-chevron-down"></i>
        }
      </button>

      @if (showUserMenu) {
        <div class="user-dropdown">
          @if (authService.currentUser(); as user) {
            <div class="dropdown-header">
              <div class="user-info">
                <div class="fw-bold">{{ user.full_name }}</div>
                <small class="text-muted">{{ user.email }}</small>
              </div>
            </div>
          }
          <div class="dropdown-divider"></div>
          <a [routerLink]="['/rider/profile']" class="dropdown-item" (click)="showUserMenu = false">
            <i class="bi bi-person me-2"></i>
            My Profile
          </a>
          <a [routerLink]="['/rider/settings']" class="dropdown-item" (click)="showUserMenu = false">
            <i class="bi bi-gear me-2"></i>
            Settings
          </a>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item text-danger" (click)="logout()">
            <i class="bi bi-box-arrow-right me-2"></i>
            Logout
          </button>
        </div>
      }
    </div>
  </div>
</nav>
