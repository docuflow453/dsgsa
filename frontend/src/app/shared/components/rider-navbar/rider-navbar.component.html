<nav class="rider-navbar">
  <div class="navbar-container">
    <div class="navbar-shell">
      <a routerLink="/my/dashboard" class="navbar-brand" (click)="closeUserMenu()">
        <span class="brand-mark"><i class="bi bi-trophy-fill"></i></span>
        <span class="brand-copy">
          <span class="brand-title">DSRiding</span>
          <span class="brand-subtitle">Rider portal</span>
        </span>
      </a>

      <ul class="nav-menu">
        @for (item of navItems; track item.route) {
          <li class="nav-item">
            <a
              [routerLink]="item.route"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: false }"
              class="nav-link"
              (click)="closeUserMenu()">
              <i class="bi {{ item.icon }}"></i>
              <span>{{ item.label }}</span>
            </a>
          </li>
        }
      </ul>

      <div class="navbar-user">
        <button type="button" class="user-menu-trigger" (click)="toggleUserMenu()">
          @if (authService.currentUser(); as user) {
            <div class="user-avatar">
              {{ getUserInitials(user) }}
            </div>
            <div class="user-copy">
              <span class="user-label">Signed in</span>
              <span class="user-name">{{ getUserFirstName(user) }}</span>
            </div>
          } @else {
            <div class="user-avatar">
              <i class="bi bi-person"></i>
            </div>
            <div class="user-copy">
              <span class="user-label">Rider</span>
              <span class="user-name">Account</span>
            </div>
          }
          <i class="bi bi-chevron-down menu-caret"></i>
        </button>

        @if (showUserMenu) {
          <div class="user-dropdown">
            @if (authService.currentUser(); as user) {
              <div class="dropdown-header">
                <span class="dropdown-eyebrow">Signed in as</span>
                <div class="dropdown-name">{{ user.full_name }}</div>
                <small>{{ user.email }}</small>
              </div>
            }

            <a [routerLink]="['/my/profile']" class="dropdown-item" (click)="closeUserMenu()">
              <i class="bi bi-person"></i>
              <span>My Profile</span>
            </a>
            <a [routerLink]="['/my/settings']" class="dropdown-item" (click)="closeUserMenu()">
              <i class="bi bi-gear"></i>
              <span>Settings</span>
            </a>
            <button type="button" class="dropdown-item dropdown-item-danger" (click)="logout()">
              <i class="bi bi-box-arrow-right"></i>
              <span>Logout</span>
            </button>
          </div>
        }
      </div>
    </div>
  </div>
</nav>
