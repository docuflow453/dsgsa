<nav>
  <div class="app-logo">
    <div class="logo">
      <i class="bi bi-trophy-fill" style="font-size: 28px; color: rgba(var(--primary), 1); margin-right: 10px;"></i>
      <span style="font-size: 20px; font-weight: 700; color: var(--font-title-color);">DSRiding</span>
    </div>
  </div>

  <div class="app-nav">
    <ul class="main-nav">
      @for (item of navItems; track item.route) {
        @if (shouldShowItem(item)) {
          <li class="no-sub">
            <a
              [routerLink]="item.route"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{exact: false}">
              <i class="bi {{ item.icon }}"></i>
              <span>{{ item.label }}</span>
            </a>
          </li>
        }
      }
    </ul>
  </div>
</nav>
