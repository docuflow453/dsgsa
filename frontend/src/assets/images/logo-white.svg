<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Enhanced Dressage Horse and Rider Silhouette -->
  <g transform="translate(5, 8)">
    <!-- Horse body - more realistic proportions -->
    <ellipse cx="30" cy="32" rx="18" ry="12" fill="white" opacity="0.95"/>

    <!-- Horse neck - elegant arch -->
    <path d="M42 28 Q45 22, 48 18 Q50 15, 52 14" stroke="white" stroke-width="4" fill="none" opacity="0.95" stroke-linecap="round"/>

    <!-- Horse head - refined -->
    <ellipse cx="52" cy="12" rx="4" ry="5" fill="white" opacity="0.95"/>
    <path d="M54 10 L56 9" stroke="white" stroke-width="1.5" opacity="0.95" stroke-linecap="round"/>

    <!-- Horse legs - dressage position (extended) -->
    <path d="M20 40 Q18 46, 18 50" stroke="white" stroke-width="3.5" fill="none" opacity="0.95" stroke-linecap="round"/>
    <path d="M26 40 Q25 48, 25 52" stroke="white" stroke-width="3.5" fill="none" opacity="0.95" stroke-linecap="round"/>
    <path d="M34 40 Q36 46, 37 50" stroke="white" stroke-width="3.5" fill="none" opacity="0.95" stroke-linecap="round"/>
    <path d="M40 40 Q42 44, 44 46" stroke="white" stroke-width="3.5" fill="none" opacity="0.95" stroke-linecap="round"/>

    <!-- Horse tail - flowing -->
    <path d="M14 30 Q10 32, 8 36 Q6 40, 5 44" stroke="white" stroke-width="2.5" fill="none" opacity="0.9" stroke-linecap="round"/>

    <!-- Horse mane - elegant -->
    <path d="M46 16 Q44 14, 42 12" stroke="white" stroke-width="2" fill="none" opacity="0.9" stroke-linecap="round"/>
    <path d="M48 18 Q46 16, 44 14" stroke="white" stroke-width="1.8" fill="none" opacity="0.85" stroke-linecap="round"/>

    <!-- Rider - professional posture -->
    <ellipse cx="32" cy="22" rx="5" ry="7" fill="white" opacity="0.95"/>
    <circle cx="32" cy="14" r="3.5" fill="white" opacity="0.95"/>
    <path d="M32 22 L28 34" stroke="white" stroke-width="2.5" opacity="0.95" stroke-linecap="round"/>
    <path d="M32 22 L36 34" stroke="white" stroke-width="2.5" opacity="0.95" stroke-linecap="round"/>
    <path d="M32 18 L27 24" stroke="white" stroke-width="2" opacity="0.95" stroke-linecap="round"/>

    <!-- Saddle detail -->
    <ellipse cx="30" cy="30" rx="6" ry="3" fill="white" opacity="0.7"/>
  </g>

  <!-- Decorative circular frame -->
  <circle cx="30" cy="30" r="28" stroke="white" stroke-width="1.8" fill="none" opacity="0.35"/>
  <circle cx="30" cy="30" r="25" stroke="white" stroke-width="0.8" fill="none" opacity="0.25"/>

  <!-- Elegant text -->
  <text x="68" y="32" font-family="Georgia, serif" font-size="20" font-weight="700" fill="white" letter-spacing="1.5">
    DRESSAGE
  </text>
  <text x="68" y="46" font-family="Arial, sans-serif" font-size="9" font-weight="500" fill="white" opacity="0.85" letter-spacing="3">
    SOUTH AFRICA
  </text>
</svg>

