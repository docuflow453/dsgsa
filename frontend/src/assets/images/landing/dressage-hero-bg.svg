<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Professional Dressage Arena Scene -->

  <!-- Background gradients -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a6c7d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a5568;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arenaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b8268;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b7355;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b5444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fenceGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="70%" style="stop-color:#000000;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.5" />
    </radialGradient>
    <linearGradient id="horseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky with atmospheric depth -->
  <rect width="1920" height="650" fill="url(#skyGradient)"/>

  <!-- Distant trees/background -->
  <ellipse cx="300" cy="600" rx="200" ry="80" fill="#3a4a5a" opacity="0.3"/>
  <ellipse cx="800" cy="620" rx="250" ry="90" fill="#3a4a5a" opacity="0.25"/>
  <ellipse cx="1400" cy="610" rx="220" ry="85" fill="#3a4a5a" opacity="0.28"/>
  <ellipse cx="1700" cy="630" rx="180" ry="70" fill="#3a4a5a" opacity="0.22"/>

  <!-- Arena ground with texture -->
  <rect y="650" width="1920" height="430" fill="url(#arenaGradient)"/>

  <!-- Ground texture lines -->
  <line x1="0" y1="680" x2="1920" y2="680" stroke="#7a6450" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="720" x2="1920" y2="720" stroke="#7a6450" stroke-width="1" opacity="0.25"/>
  <line x1="0" y1="760" x2="1920" y2="760" stroke="#7a6450" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="800" x2="1920" y2="800" stroke="#7a6450" stroke-width="1" opacity="0.15"/>

  <!-- Arena fence - white rails -->
  <rect x="0" y="645" width="1920" height="8" fill="url(#fenceGradient)" opacity="0.9"/>
  <rect x="0" y="660" width="1920" height="4" fill="url(#fenceGradient)" opacity="0.7"/>

  <!-- Fence posts -->
  <rect x="150" y="630" width="12" height="35" fill="#e9ecef" opacity="0.8"/>
  <rect x="400" y="630" width="12" height="35" fill="#e9ecef" opacity="0.8"/>
  <rect x="650" y="630" width="12" height="35" fill="#e9ecef" opacity="0.8"/>
  <rect x="900" y="630" width="12" height="35" fill="#e9ecef" opacity="0.8"/>
  <rect x="1150" y="630" width="12" height="35" fill="#e9ecef" opacity="0.8"/>
  <rect x="1400" y="630" width="12" height="35" fill="#e9ecef" opacity="0.8"/>
  <rect x="1650" y="630" width="12" height="35" fill="#e9ecef" opacity="0.8"/>

  <!-- Dressage arena markers -->
  <g opacity="0.4">
    <circle cx="960" cy="720" r="35" fill="#ffffff" opacity="0.5"/>
    <text x="960" y="735" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#2d3748" text-anchor="middle">A</text>
  </g>
  <g opacity="0.35">
    <circle cx="400" cy="820" r="28" fill="#ffffff" opacity="0.5"/>
    <text x="400" y="832" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#2d3748" text-anchor="middle">K</text>
  </g>
  <g opacity="0.35">
    <circle cx="1520" cy="820" r="28" fill="#ffffff" opacity="0.5"/>
    <text x="1520" y="832" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#2d3748" text-anchor="middle">F</text>
  </g>

  <!-- Main horse and rider - professional dressage position -->
  <g transform="translate(750, 350) scale(4.5)">
    <!-- Horse body with gradient -->
    <ellipse cx="50" cy="65" rx="32" ry="20" fill="url(#horseGradient)" opacity="0.9"/>

    <!-- Horse neck - elegant arch (piaffe position) -->
    <path d="M72 58 Q78 48, 82 40 Q85 34, 88 32" stroke="#1a1a1a" stroke-width="7" fill="none" opacity="0.9" stroke-linecap="round"/>
    <path d="M74 60 Q79 51, 83 44 Q86 38, 88 36" stroke="#2d2d2d" stroke-width="5" fill="none" opacity="0.7" stroke-linecap="round"/>

    <!-- Horse head - refined and alert -->
    <ellipse cx="88" cy="28" rx="6" ry="8" fill="#1a1a1a" opacity="0.9"/>
    <path d="M91 24 L94 22" stroke="#1a1a1a" stroke-width="2" opacity="0.9" stroke-linecap="round"/>
    <circle cx="90" cy="26" r="1" fill="#ffffff" opacity="0.6"/>

    <!-- Bridle detail -->
    <path d="M86 32 Q88 30, 90 30" stroke="#4a4a4a" stroke-width="1.5" opacity="0.8" stroke-linecap="round"/>

    <!-- Horse legs - extended dressage movement (passage) -->
    <path d="M32 78 Q28 88, 26 96" stroke="#1a1a1a" stroke-width="6" fill="none" opacity="0.9" stroke-linecap="round"/>
    <path d="M42 78 Q40 92, 39 100" stroke="#1a1a1a" stroke-width="6" fill="none" opacity="0.9" stroke-linecap="round"/>
    <path d="M58 78 Q62 88, 65 96" stroke="#1a1a1a" stroke-width="6" fill="none" opacity="0.9" stroke-linecap="round"/>
    <path d="M68 78 Q72 86, 76 92" stroke="#1a1a1a" stroke-width="6" fill="none" opacity="0.9" stroke-linecap="round"/>

    <!-- Hooves -->
    <ellipse cx="26" cy="98" rx="3" ry="2" fill="#0a0a0a" opacity="0.9"/>
    <ellipse cx="39" cy="102" rx="3" ry="2" fill="#0a0a0a" opacity="0.9"/>
    <ellipse cx="65" cy="98" rx="3" ry="2" fill="#0a0a0a" opacity="0.9"/>
    <ellipse cx="76" cy="94" rx="3" ry="2" fill="#0a0a0a" opacity="0.9"/>

    <!-- Horse tail - flowing elegantly -->
    <path d="M22 62 Q16 66, 12 72 Q8 78, 6 84 Q4 90, 3 96" stroke="#1a1a1a" stroke-width="4" fill="none" opacity="0.85" stroke-linecap="round"/>
    <path d="M24 64 Q18 68, 14 74 Q10 80, 8 86" stroke="#2d2d2d" stroke-width="2.5" fill="none" opacity="0.7" stroke-linecap="round"/>

    <!-- Horse mane - flowing -->
    <path d="M78 42 Q75 38, 72 34" stroke="#1a1a1a" stroke-width="3" fill="none" opacity="0.85" stroke-linecap="round"/>
    <path d="M80 44 Q77 40, 74 36" stroke="#1a1a1a" stroke-width="2.5" fill="none" opacity="0.8" stroke-linecap="round"/>
    <path d="M82 46 Q79 42, 76 38" stroke="#1a1a1a" stroke-width="2" fill="none" opacity="0.75" stroke-linecap="round"/>

    <!-- Rider - professional dressage attire -->
    <ellipse cx="52" cy="48" rx="8" ry="12" fill="#2d3748" opacity="0.95"/>
    <circle cx="52" cy="34" r="5.5" fill="#2d3748" opacity="0.95"/>

    <!-- Rider's legs -->
    <path d="M52 52 L46 72" stroke="#2d3748" stroke-width="4.5" opacity="0.95" stroke-linecap="round"/>
    <path d="M52 52 L58 72" stroke="#2d3748" stroke-width="4.5" opacity="0.95" stroke-linecap="round"/>

    <!-- Rider's arms (holding reins) -->
    <path d="M52 44 L44 52" stroke="#2d3748" stroke-width="3.5" opacity="0.95" stroke-linecap="round"/>
    <path d="M52 44 L60 50" stroke="#2d3748" stroke-width="3.5" opacity="0.95" stroke-linecap="round"/>

    <!-- Riding boots -->
    <ellipse cx="46" cy="74" rx="2.5" ry="3" fill="#0a0a0a" opacity="0.9"/>
    <ellipse cx="58" cy="74" rx="2.5" ry="3" fill="#0a0a0a" opacity="0.9"/>

    <!-- Saddle and tack details -->
    <ellipse cx="50" cy="62" rx="10" ry="5" fill="#4a3020" opacity="0.8"/>
    <path d="M44 60 Q50 58, 56 60" stroke="#3a2010" stroke-width="1.5" opacity="0.7"/>

    <!-- Reins -->
    <path d="M44 52 Q60 48, 86 32" stroke="#4a4a4a" stroke-width="1.2" opacity="0.6" stroke-linecap="round"/>
  </g>



  <!-- Atmospheric clouds -->
  <ellipse cx="400" cy="180" rx="180" ry="50" fill="#ffffff" opacity="0.08"/>
  <ellipse cx="1500" cy="250" rx="220" ry="60" fill="#ffffff" opacity="0.06"/>
  <ellipse cx="900" cy="140" rx="150" ry="45" fill="#ffffff" opacity="0.07"/>
  <ellipse cx="1200" cy="320" rx="190" ry="55" fill="#ffffff" opacity="0.05"/>

  <!-- Subtle light rays from top -->
  <path d="M800 0 L750 650" stroke="#ffffff" stroke-width="2" opacity="0.03"/>
  <path d="M1000 0 L950 650" stroke="#ffffff" stroke-width="2" opacity="0.03"/>
  <path d="M1200 0 L1150 650" stroke="#ffffff" stroke-width="2" opacity="0.03"/>

  <!-- Arena dust particles (subtle) -->
  <circle cx="600" cy="750" r="3" fill="#ffffff" opacity="0.15"/>
  <circle cx="850" cy="820" r="2" fill="#ffffff" opacity="0.12"/>
  <circle cx="1100" cy="780" r="2.5" fill="#ffffff" opacity="0.14"/>
  <circle cx="1350" cy="850" r="2" fill="#ffffff" opacity="0.11"/>
  <circle cx="450" cy="900" r="2" fill="#ffffff" opacity="0.13"/>

  <!-- Spectator area silhouettes (distant) -->
  <rect x="50" y="580" width="300" height="60" fill="#1a1a1a" opacity="0.15"/>
  <rect x="1570" y="580" width="300" height="60" fill="#1a1a1a" opacity="0.15"/>

  <!-- Vignette overlay for depth -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>

  <!-- Subtle overlay for professional look -->
  <rect width="1920" height="1080" fill="#000000" opacity="0.15"/>

</svg>