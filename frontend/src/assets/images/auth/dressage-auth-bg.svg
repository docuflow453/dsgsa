<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <!-- Sky Gradient Background -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="groundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0826D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="1920" height="700" fill="url(#skyGradient)"/>
  
  <!-- Arena Ground -->
  <rect y="700" width="1920" height="380" fill="url(#groundGradient)"/>
  
  <!-- Arena Fence (Background) -->
  <g opacity="0.3">
    <!-- Horizontal Rails -->
    <rect x="0" y="720" width="1920" height="8" fill="#654321"/>
    <rect x="0" y="780" width="1920" height="8" fill="#654321"/>
    <rect x="0" y="840" width="1920" height="8" fill="#654321"/>
    
    <!-- Vertical Posts -->
    <rect x="100" y="700" width="12" height="160" fill="#4A3728"/>
    <rect x="300" y="700" width="12" height="160" fill="#4A3728"/>
    <rect x="500" y="700" width="12" height="160" fill="#4A3728"/>
    <rect x="700" y="700" width="12" height="160" fill="#4A3728"/>
    <rect x="900" y="700" width="12" height="160" fill="#4A3728"/>
    <rect x="1100" y="700" width="12" height="160" fill="#4A3728"/>
    <rect x="1300" y="700" width="12" height="160" fill="#4A3728"/>
    <rect x="1500" y="700" width="12" height="160" fill="#4A3728"/>
    <rect x="1700" y="700" width="12" height="160" fill="#4A3728"/>
  </g>
  
  <!-- Dressage Arena Letters (subtle) -->
  <g opacity="0.2" fill="#FFFFFF" font-family="Georgia, serif" font-size="48" font-weight="bold">
    <text x="960" y="750" text-anchor="middle">C</text>
    <text x="200" y="900" text-anchor="middle">M</text>
    <text x="1720" y="900" text-anchor="middle">H</text>
  </g>
  
  <!-- Horse and Rider Silhouette (Center-Right) -->
  <g transform="translate(1100, 400) scale(2.5)">
    <!-- Horse Body -->
    <ellipse cx="0" cy="0" rx="80" ry="50" fill="#2C1810"/>
    
    <!-- Horse Neck -->
    <path d="M -60,-20 Q -80,-60 -70,-100 L -60,-105 Q -50,-65 -50,-20 Z" fill="#2C1810"/>
    
    <!-- Horse Head -->
    <ellipse cx="-65" cy="-110" rx="18" ry="22" fill="#2C1810"/>
    <path d="M -65,-132 L -63,-142 L -67,-142 Z" fill="#2C1810"/>
    
    <!-- Horse Ears -->
    <path d="M -72,-128 L -78,-138 L -70,-132 Z" fill="#2C1810"/>
    <path d="M -58,-128 L -52,-138 L -60,-132 Z" fill="#2C1810"/>
    
    <!-- Horse Mane -->
    <path d="M -75,-100 Q -85,-95 -80,-85 Q -85,-75 -75,-70 Q -80,-60 -70,-55" 
          stroke="#1A0F08" stroke-width="3" fill="none"/>
    
    <!-- Horse Tail (flowing) -->
    <path d="M 75,10 Q 95,0 105,-10 Q 110,-20 108,-35 Q 105,-45 100,-50" 
          stroke="#1A0F08" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Horse Legs (Front) -->
    <rect x="-50" y="40" width="10" height="70" fill="#2C1810"/>
    <rect x="-30" y="45" width="10" height="65" fill="#2C1810"/>
    
    <!-- Horse Legs (Back) -->
    <rect x="30" y="40" width="10" height="70" fill="#2C1810"/>
    <rect x="50" y="45" width="10" height="65" fill="#2C1810"/>
    
    <!-- Hooves -->
    <rect x="-52" y="108" width="14" height="8" rx="2" fill="#1A0F08"/>
    <rect x="-32" y="108" width="14" height="8" rx="2" fill="#1A0F08"/>
    <rect x="28" y="108" width="14" height="8" rx="2" fill="#1A0F08"/>
    <rect x="48" y="108" width="14" height="8" rx="2" fill="#1A0F08"/>
    
    <!-- Saddle -->
    <ellipse cx="-10" cy="-15" rx="35" ry="20" fill="#654321"/>
    <path d="M -40,-15 Q -45,-25 -35,-30 L 15,-30 Q 25,-25 20,-15 Z" fill="#8B4513"/>
    
    <!-- Rider Body -->
    <ellipse cx="-15" cy="-50" rx="20" ry="35" fill="#1C3A5C"/>
    
    <!-- Rider Head -->
    <circle cx="-15" cy="-90" r="15" fill="#D4A574"/>
    
    <!-- Riding Helmet -->
    <ellipse cx="-15" cy="-95" rx="17" ry="12" fill="#000000"/>
    <rect x="-20" y="-88" width="10" height="4" fill="#000000"/>
    
    <!-- Rider Arm (holding reins) -->
    <path d="M -25,-60 L -45,-70 L -55,-85" stroke="#1C3A5C" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Rider Leg -->
    <rect x="-25" y="-20" width="12" height="45" fill="#1C3A5C"/>
    
    <!-- Riding Boot -->
    <rect x="-27" y="22" width="16" height="20" fill="#000000"/>
    
    <!-- Reins -->
    <path d="M -55,-85 Q -60,-95 -65,-105" stroke="#8B4513" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Decorative Elements - Dressage Markers -->
  <g opacity="0.15">
    <circle cx="150" cy="300" r="40" fill="#FFFFFF"/>
    <circle cx="1770" cy="250" r="50" fill="#FFFFFF"/>
    <circle cx="300" cy="500" r="35" fill="#FFFFFF"/>
  </g>
  
  <!-- Subtle Pattern Overlay -->
  <rect width="1920" height="1080" fill="url(#pattern)" opacity="0.03"/>
  <defs>
    <pattern id="pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#000000"/>
    </pattern>
  </defs>
</svg>

