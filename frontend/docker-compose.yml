version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: dressage-frontend:latest
    container_name: dressage-frontend
    ports:
      - "4200:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - dressage-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  dressage-network:
    driver: bridge

