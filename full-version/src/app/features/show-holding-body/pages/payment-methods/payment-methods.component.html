<div class="payment-methods-page">
  <div class="page-header mb-4">
    <h2>Payment Methods</h2>
    <p class="text-muted">Configure payment methods accepted for competitions</p>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
    <div class="toast" [class.show]="showToast" [class.bg-success]="toastType === 'success'" [class.bg-danger]="toastType === 'error'">
      <div class="toast-body text-white">
        <i class="ti" [class.ti-check]="toastType === 'success'" [class.ti-alert-circle]="toastType === 'error'" class="me-2"></i>
        {{ toastMessage }}
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div *ngIf="!loading" class="row">
    <div *ngFor="let method of paymentMethods" class="col-md-6 mb-4">
      <div class="card">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <div class="d-flex align-items-center">
              <div class="payment-icon me-3">
                <i class="ti ti-credit-card"></i>
              </div>
              <div>
                <h5 class="card-title mb-0">{{ method.name }}</h5>
                <p class="text-muted mb-0 small">{{ method.description }}</p>
              </div>
            </div>
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" [checked]="method.isActive" 
                (change)="toggleStatus(method)" role="switch">
            </div>
          </div>
          <div class="payment-details">
            <div class="detail-item">
              <i class="ti ti-percentage me-2"></i>
              <strong>Processing Fee:</strong> 
              <span *ngIf="method.processingFee > 0">{{ method.processingFee }}%</span>
              <span *ngIf="method.processingFee === 0" class="text-success">Free</span>
            </div>
            <div class="detail-item">
              <i class="ti ti-circle-check me-2"></i>
              <strong>Status:</strong> 
              <span [class.text-success]="method.isActive" [class.text-muted]="!method.isActive">
                {{ method.isActive ? 'Enabled' : 'Disabled' }}
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
