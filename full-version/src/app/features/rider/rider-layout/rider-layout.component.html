<!-- Rider Layout - Dual Navigation (Top Public Nav + Sidebar) -->
<div class="rider-layout">
  <!-- Top Navigation Bar (Public Menu) -->
  <nav class="navbar navbar-expand-lg navbar-dark top-nav">
    <div class="container-fluid">
      <!-- Logo -->
      <a class="navbar-brand" [routerLink]="['/']">
        <img src="assets/images/dressage-logo-white.svg" alt="DSRiding Logo" class="logo" />
      </a>

      <!-- Mobile Toggle -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Navigation Links -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/']" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
              Home
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/about']">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/events']">Events</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/news']">News</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/contact']">Contact</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/my']" routerLinkActive="active">
              <i class="ti ti-dashboard me-1"></i>My Dashboard
            </a>
          </li>
        </ul>

        <!-- User Menu -->
        <div class="navbar-nav">
          <div class="nav-item dropdown" ngbDropdown>
            <a class="nav-link dropdown-toggle d-flex align-items-center" ngbDropdownToggle>
              <i class="ti ti-user-circle me-2" style="font-size: 1.5rem;"></i>
              <span>{{ currentUser?.firstName || 'User' }}</span>
            </a>
            <div class="dropdown-menu dropdown-menu-end" ngbDropdownMenu>
              <a class="dropdown-item" [routerLink]="['/my/profile']">
                <i class="ti ti-user me-2"></i>My Profile
              </a>
              <a class="dropdown-item" [routerLink]="['/settings']">
                <i class="ti ti-settings me-2"></i>Settings
              </a>
              <div class="dropdown-divider"></div>
              <a class="dropdown-item" (click)="logout()">
                <i class="ti ti-logout me-2"></i>Logout
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Container with Sidebar -->
  <div class="main-container">
    <!-- Sidebar (Rider-Specific Menu) -->
    <aside class="sidebar" [class.collapsed]="sidebarCollapsed">
      <!-- User Profile Section -->
      <div class="sidebar-header">
        <div class="user-profile">
          <div class="user-avatar">
            <i class="ti ti-user-circle"></i>
          </div>
          <div class="user-info" *ngIf="!sidebarCollapsed">
            <h6 class="user-name">{{ riderProfile?.firstName }} {{ riderProfile?.lastName }}</h6>
            <small class="text-muted">Member since {{ getMemberSince() }}</small>
          </div>
        </div>
        <button class="btn btn-link sidebar-toggle" (click)="toggleSidebar()">
          <i class="ti" [class.ti-chevron-left]="!sidebarCollapsed" [class.ti-chevron-right]="sidebarCollapsed"></i>
        </button>
      </div>

      <!-- Sidebar Navigation -->
      <nav class="sidebar-nav">
        <a [routerLink]="['./dashboard']" routerLinkActive="active" class="nav-link">
          <i class="ti ti-dashboard"></i>
          <span>Dashboard</span>
        </a>
        <a [routerLink]="['./profile']" routerLinkActive="active" class="nav-link">
          <i class="ti ti-user"></i>
          <span>Profile</span>
        </a>
        <a [routerLink]="['./transactions']" routerLinkActive="active" class="nav-link">
          <i class="ti ti-credit-card"></i>
          <span>Transactions</span>
        </a>
        <a [routerLink]="['./entries']" routerLinkActive="active" class="nav-link">
          <i class="ti ti-calendar-event"></i>
          <span>Entries</span>
        </a>
        <a [routerLink]="['./horses']" routerLinkActive="active" class="nav-link">
          <i class="ti ti-horse"></i>
          <span>Horses</span>
        </a>

        <div class="sidebar-divider"></div>

        <a [routerLink]="['/settings']" class="nav-link">
          <i class="ti ti-settings"></i>
          <span>Settings</span>
        </a>
        <a [routerLink]="['/help']" class="nav-link">
          <i class="ti ti-help"></i>
          <span>Help</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
