<!-- Rider Layout - Dual Navigation (Top Nav + Sidebar) -->
<div class="rider-layout">
  <!-- Top Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary top-nav">
    <div class="container-fluid px-4">
      <!-- Logo -->
      <a class="navbar-brand d-flex align-items-center" [routerLink]="['/']">
        <i class="ti ti-horse me-2" style="font-size: 1.75rem;"></i>
        <span class="fw-bold">DSRiding</span>
      </a>

      <!-- Mobile Toggle -->
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Navigation Links & User Menu -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <!-- Spacer to push items to the right -->
        <div class="navbar-nav me-auto"></div>

        <!-- Right Side: Utility Items & User Menu -->
        <div class="navbar-nav ms-auto d-flex align-items-center">
          <!-- Calendar -->
          <a class="nav-link" [routerLink]="['./entries']" title="Calendar" ngbTooltip="View Calendar">
            <i class="ti ti-calendar"></i>
          </a>

          <!-- Basket/Cart -->
          <a class="nav-link position-relative" [routerLink]="['./basket']" title="Basket" ngbTooltip="View Basket">
            <i class="ti ti-shopping-cart"></i>
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" *ngIf="basketCount > 0">
              {{ basketCount }}
              <span class="visually-hidden">items in basket</span>
            </span>
          </a>

          <!-- User Dropdown -->
          <div class="nav-item dropdown" ngbDropdown>
            <a class="nav-link dropdown-toggle d-flex align-items-center user-menu-toggle" ngbDropdownToggle>
              <i class="ti ti-user-circle me-2"></i>
              <span class="user-email">{{ currentUser?.email || 'user@dsriding.com' }}</span>
            </a>
            <div class="dropdown-menu dropdown-menu-end user-dropdown" ngbDropdownMenu>
              <a class="dropdown-item" [routerLink]="['./profile']">
                <i class="ti ti-user me-2"></i>Account
              </a>
              <a class="dropdown-item" [routerLink]="['./clubs']">
                <i class="ti ti-building me-2"></i>Clubs
              </a>
              <a class="dropdown-item" [routerLink]="['./horses']">
                <i class="ti ti-horse me-2"></i>Horses
              </a>
              <div class="dropdown-divider"></div>
              <a class="dropdown-item" (click)="logout()">
                <i class="ti ti-logout me-2"></i>Sign out
              </a>
            </div>
          </div>

          <!-- Theme Toggle -->
          <a class="nav-link" href="#" title="Theme" ngbTooltip="Toggle Theme">
            <i class="ti ti-sun"></i>
          </a>

          <!-- Search -->
          <a class="nav-link" href="#" title="Search" ngbTooltip="Search">
            <i class="ti ti-search"></i>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Container with Sidebar (Centered) -->
  <div class="layout-wrapper">
    <div class="centered-container">
      <div class="d-flex layout-inner">
        <!-- Sidebar (Rider-Specific Menu) -->
        <aside class="sidebar bg-dark">
          <!-- Sidebar Navigation -->
          <nav class="sidebar-nav">
            <!-- ACCOUNT Section -->
            <div class="sidebar-section">
              <h6 class="sidebar-section-title text-uppercase text-muted px-3 py-2 mb-0">Account</h6>
              <a [routerLink]="['./profile']" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}" class="sidebar-link">
                <i class="ti ti-user"></i>
                <span>Account</span>
              </a>
              <a [routerLink]="['./clubs']" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}" class="sidebar-link">
                <i class="ti ti-building"></i>
                <span>Clubs</span>
              </a>
              <a [routerLink]="['./horses']" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}" class="sidebar-link">
                <i class="ti ti-horse"></i>
                <span>Horses</span>
              </a>
              <a [routerLink]="['./security']" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}" class="sidebar-link">
                <i class="ti ti-lock"></i>
                <span>Security</span>
              </a>
              <a [routerLink]="['./two-factor']" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}" class="sidebar-link">
                <i class="ti ti-shield-check"></i>
                <span>Two Factor</span>
              </a>
            </div>

            <!-- BILLING Section -->
            <div class="sidebar-section">
              <h6 class="sidebar-section-title text-uppercase text-muted px-3 py-2 mb-0">Billing</h6>
              <a [routerLink]="['./transactions']" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}" class="sidebar-link">
                <i class="ti ti-credit-card"></i>
                <span>Transactions</span>
              </a>
              <a [routerLink]="['./memberships']" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}" class="sidebar-link">
                <i class="ti ti-tag"></i>
                <span>Memberships</span>
              </a>
              <a [routerLink]="['./invoices']" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}" class="sidebar-link">
                <i class="ti ti-file-invoice"></i>
                <span>Invoices</span>
              </a>
            </div>

            <!-- ENTRIES Section -->
            <div class="sidebar-section">
              <h6 class="sidebar-section-title text-uppercase text-muted px-3 py-2 mb-0">Entries</h6>
              <a [routerLink]="['./entries']" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}" class="sidebar-link">
                <i class="ti ti-calendar"></i>
                <span>Upcoming</span>
              </a>
              <a [routerLink]="['./results']" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}" class="sidebar-link">
                <i class="ti ti-trophy"></i>
                <span>Results</span>
              </a>
              <a [routerLink]="['./riding-order']" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}" class="sidebar-link">
                <i class="ti ti-list"></i>
                <span>Riding Order</span>
              </a>
            </div>
          </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content flex-fill">
          <router-outlet></router-outlet>
        </main>
      </div>
    </div>
  </div>
</div>
