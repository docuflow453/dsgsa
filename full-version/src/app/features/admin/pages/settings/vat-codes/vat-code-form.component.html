<div class="row">
  <div class="col-sm-12">
    <app-card>
      <div class="card-header" card-header>
        <h5 class="mb-0">
          <i class="ti ti-receipt-tax me-2"></i>{{ pageTitle }}
        </h5>
      </div>
      <div class="card-body">
        <form [formGroup]="vatCodeForm" (ngSubmit)="onSubmit()">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Code <span class="text-danger">*</span></label>
              <input
                type="text"
                class="form-control"
                formControlName="code"
                placeholder="Enter VAT code (e.g., VAT15)"
                [class.is-invalid]="submitted && vatCodeForm.get('code')?.invalid"
              />
              <div class="invalid-feedback" *ngIf="submitted && vatCodeForm.get('code')?.invalid">
                Code is required
              </div>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Name <span class="text-danger">*</span></label>
              <input
                type="text"
                class="form-control"
                formControlName="name"
                placeholder="Enter VAT code name"
                [class.is-invalid]="submitted && vatCodeForm.get('name')?.invalid"
              />
              <div class="invalid-feedback" *ngIf="submitted && vatCodeForm.get('name')?.invalid">
                Name is required
              </div>
            </div>

            <div class="col-md-12 mb-3">
              <label class="form-label">Description</label>
              <textarea
                class="form-control"
                formControlName="description"
                rows="2"
                placeholder="Enter description"
              ></textarea>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Rate (%) <span class="text-danger">*</span></label>
              <input
                type="number"
                class="form-control"
                formControlName="rate"
                placeholder="Enter rate"
                step="0.01"
                min="0"
                max="100"
                [class.is-invalid]="submitted && vatCodeForm.get('rate')?.invalid"
              />
              <div class="invalid-feedback" *ngIf="submitted && vatCodeForm.get('rate')?.invalid">
                Rate must be between 0 and 100
              </div>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Status <span class="text-danger">*</span></label>
              <select class="form-select" formControlName="status">
                <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
              </select>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Effective Date</label>
              <input type="date" class="form-control" formControlName="effectiveDate" />
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Expiry Date</label>
              <input type="date" class="form-control" formControlName="expiryDate" />
            </div>

            <div class="col-md-12 mb-3">
              <label class="form-label d-block">Applicable To</label>
              <div class="form-check form-check-inline">
                <input
                  class="form-check-input"
                  type="checkbox"
                  formControlName="applicableToMemberships"
                  id="applicableToMemberships"
                />
                <label class="form-check-label" for="applicableToMemberships">
                  Memberships
                </label>
              </div>
              <div class="form-check form-check-inline">
                <input
                  class="form-check-input"
                  type="checkbox"
                  formControlName="applicableToCompetitions"
                  id="applicableToCompetitions"
                />
                <label class="form-check-label" for="applicableToCompetitions">
                  Competitions
                </label>
              </div>
            </div>

            <div class="col-md-12 mb-3">
              <label class="form-label">Notes</label>
              <textarea
                class="form-control"
                formControlName="notes"
                rows="3"
                placeholder="Enter any additional notes"
              ></textarea>
            </div>
          </div>

          <div class="d-flex justify-content-end gap-2 mt-3">
            <button type="button" class="btn btn-secondary" (click)="cancel()">
              <i class="ti ti-x"></i> Cancel
            </button>
            <button type="submit" class="btn btn-primary">
              <i class="ti ti-check"></i> {{ isEditMode ? 'Update' : 'Create' }} VAT Code
            </button>
          </div>
        </form>
      </div>
    </app-card>
  </div>
</div>
