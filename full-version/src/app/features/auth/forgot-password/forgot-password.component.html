<!-- Forgot Password Card -->
<div class="auth-card">
  <!-- Header -->
  <div class="auth-card-header">
    <h2>Forgot Password?</h2>
    <p>Enter your email address and we'll send you instructions to reset your password</p>
  </div>

  <!-- Success Alert -->
  <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="ti ti-circle-check me-2"></i>
    {{ successMessage }}
    <button type="button" class="btn-close" (click)="successMessage = ''" aria-label="Close"></button>
  </div>

  <!-- Error Alert -->
  <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
    <i class="ti ti-alert-circle me-2"></i>
    {{ errorMessage }}
    <button type="button" class="btn-close" (click)="errorMessage = ''" aria-label="Close"></button>
  </div>

  <!-- Forgot Password Form -->
  <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="auth-card-body">
    <!-- Email Field -->
    <div class="mb-4">
      <label for="email" class="form-label">Email Address</label>
      <div class="input-group">
        <span class="input-group-text">
          <i class="ti ti-mail"></i>
        </span>
        <input
          type="email"
          class="form-control"
          id="email"
          formControlName="email"
          placeholder="Enter your email"
          [class.is-invalid]="hasError('email', 'required') || hasError('email', 'email')"
        />
      </div>
      <div class="invalid-feedback d-block" *ngIf="hasError('email', 'required')">
        Email is required
      </div>
      <div class="invalid-feedback d-block" *ngIf="hasError('email', 'email')">
        Please enter a valid email address
      </div>
    </div>

    <!-- Submit Button -->
    <button
      type="submit"
      class="btn btn-primary w-100 btn-lg mb-3"
      [disabled]="loading"
    >
      <span *ngIf="!loading">
        <i class="ti ti-send me-2"></i>Send Reset Link
      </span>
      <span *ngIf="loading">
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        Sending...
      </span>
    </button>

    <!-- Back to Login Link -->
    <div class="text-center">
      <a [routerLink]="['/auth/login']" class="text-primary">
        <i class="ti ti-arrow-left me-1"></i>Back to Login
      </a>
    </div>
  </form>

  <!-- Footer -->
  <div class="auth-card-footer">
    <p>
      Don't have an account?
      <a [routerLink]="['/auth/register']">Sign up</a>
    </p>
  </div>
</div>
