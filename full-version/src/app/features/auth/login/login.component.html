<!-- Login Card -->
<div class="auth-card">
  <!-- Header -->
  <div class="auth-card-header">
    <h2>Welcome Back</h2>
    <p>Sign in to your DSRiding account</p>
  </div>

  <!-- Error Alert -->
  <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
    <i class="ti ti-alert-circle me-2"></i>
    {{ errorMessage }}
    <button type="button" class="btn-close" (click)="errorMessage = ''" aria-label="Close"></button>
  </div>

  <!-- Login Form -->
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-card-body">
    <!-- Email Field -->
    <div class="mb-3">
      <label for="email" class="form-label">Email Address</label>
      <div class="input-group">
        <span class="input-group-text">
          <i class="ti ti-mail"></i>
        </span>
        <input
          type="email"
          class="form-control"
          id="email"
          formControlName="email"
          placeholder="Enter your email"
          [class.is-invalid]="hasError('email', 'required') || hasError('email', 'email')"
        />
      </div>
      <div class="invalid-feedback d-block" *ngIf="hasError('email', 'required')">
        Email is required
      </div>
      <div class="invalid-feedback d-block" *ngIf="hasError('email', 'email')">
        Please enter a valid email address
      </div>
    </div>

    <!-- Password Field -->
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <div class="input-group">
        <span class="input-group-text">
          <i class="ti ti-lock"></i>
        </span>
        <input
          type="password"
          class="form-control"
          id="password"
          formControlName="password"
          placeholder="Enter your password"
          [class.is-invalid]="hasError('password', 'required') || hasError('password', 'minlength')"
        />
      </div>
      <div class="invalid-feedback d-block" *ngIf="hasError('password', 'required')">
        Password is required
      </div>
      <div class="invalid-feedback d-block" *ngIf="hasError('password', 'minlength')">
        Password must be at least 6 characters
      </div>
    </div>

    <!-- Remember Me & Forgot Password -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div class="form-check">
        <input
          type="checkbox"
          class="form-check-input"
          id="rememberMe"
          formControlName="rememberMe"
        />
        <label class="form-check-label" for="rememberMe">
          Remember me
        </label>
      </div>
      <a [routerLink]="['/auth/forgot-password']" class="text-primary">
        Forgot password?
      </a>
    </div>

    <!-- Submit Button -->
    <button
      type="submit"
      class="btn btn-primary w-100 btn-lg"
      [disabled]="loading"
    >
      <span *ngIf="!loading">
        <i class="ti ti-login me-2"></i>Sign In
      </span>
      <span *ngIf="loading">
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        Signing in...
      </span>
    </button>
  </form>

  <!-- Footer -->
  <div class="auth-card-footer">
    <p>
      Don't have an account?
      <a [routerLink]="['/auth/register']">Sign up</a>
    </p>
  </div>
</div>
