<svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dressage Horse and Rider Icon - Simplified for small sizes -->
  <g transform="translate(5, 8)">
    <!-- Horse body -->
    <ellipse cx="25" cy="27" rx="15" ry="10" fill="#1f2937" opacity="0.95"/>

    <!-- Horse neck - elegant arch -->
    <path d="M35 24 Q38 19, 40 16 Q42 13, 44 12" stroke="#1f2937" stroke-width="3.5" fill="none" opacity="0.95" stroke-linecap="round"/>

    <!-- Horse head -->
    <ellipse cx="44" cy="10" rx="3.5" ry="4" fill="#1f2937" opacity="0.95"/>
    <path d="M46 8 L48 7" stroke="#1f2937" stroke-width="1.2" opacity="0.95" stroke-linecap="round"/>

    <!-- Horse legs - dressage position -->
    <path d="M17 34 Q15 39, 15 42" stroke="#1f2937" stroke-width="3" fill="none" opacity="0.95" stroke-linecap="round"/>
    <path d="M22 34 Q21 40, 21 43" stroke="#1f2937" stroke-width="3" fill="none" opacity="0.95" stroke-linecap="round"/>
    <path d="M28 34 Q30 39, 31 42" stroke="#1f2937" stroke-width="3" fill="none" opacity="0.95" stroke-linecap="round"/>
    <path d="M33 34 Q35 37, 37 39" stroke="#1f2937" stroke-width="3" fill="none" opacity="0.95" stroke-linecap="round"/>

    <!-- Horse tail -->
    <path d="M12 25 Q9 27, 7 30 Q5 33, 4 36" stroke="#1f2937" stroke-width="2" fill="none" opacity="0.9" stroke-linecap="round"/>

    <!-- Horse mane -->
    <path d="M38 14 Q36 12, 34 10" stroke="#1f2937" stroke-width="1.8" fill="none" opacity="0.9" stroke-linecap="round"/>
    <path d="M40 16 Q38 14, 36 12" stroke="#1f2937" stroke-width="1.6" fill="none" opacity="0.85" stroke-linecap="round"/>

    <!-- Rider -->
    <ellipse cx="27" cy="19" rx="4" ry="6" fill="#1f2937" opacity="0.95"/>
    <circle cx="27" cy="12" r="3" fill="#1f2937" opacity="0.95"/>
    <path d="M27 19 L24 28" stroke="#1f2937" stroke-width="2.2" opacity="0.95" stroke-linecap="round"/>
    <path d="M27 19 L30 28" stroke="#1f2937" stroke-width="2.2" opacity="0.95" stroke-linecap="round"/>
    <path d="M27 15 L23 20" stroke="#1f2937" stroke-width="1.8" opacity="0.95" stroke-linecap="round"/>

    <!-- Saddle -->
    <ellipse cx="25" cy="25" rx="5" ry="2.5" fill="#1f2937" opacity="0.7"/>
  </g>

  <!-- Decorative circular frame with blue accent -->
  <circle cx="30" cy="30" r="28" stroke="#2563eb" stroke-width="2" fill="none" opacity="0.5"/>
  <circle cx="30" cy="30" r="24" stroke="#3b82f6" stroke-width="1" fill="none" opacity="0.4"/>
</svg>

