version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: dsriding_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=dsriding_db
      - POSTGRES_USER=dsriding_user
      - POSTGRES_PASSWORD=dsriding_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsriding_user -d dsriding_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for caching and Celery)
  redis:
    image: redis:7-alpine
    container_name: dsriding_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dsriding_api
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 3 api.wsgi:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-change-this-in-production
      - DATABASE_ENGINE=django.db.backends.postgresql
      - DATABASE_NAME=dsriding_db
      - DATABASE_USER=dsriding_user
      - DATABASE_PASSWORD=dsriding_password
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - CORS_ALLOWED_ORIGINS=http://localhost:4200,http://127.0.0.1:4200
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Worker (optional - for background tasks)
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dsriding_celery
    command: celery -A api worker -l info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-change-this-in-production
      - DATABASE_ENGINE=django.db.backends.postgresql
      - DATABASE_NAME=dsriding_db
      - DATABASE_USER=dsriding_user
      - DATABASE_PASSWORD=dsriding_password
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - api

  # Celery Beat (optional - for scheduled tasks)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dsriding_celery_beat
    command: celery -A api beat -l info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-change-this-in-production
      - DATABASE_ENGINE=django.db.backends.postgresql
      - DATABASE_NAME=dsriding_db
      - DATABASE_USER=dsriding_user
      - DATABASE_PASSWORD=dsriding_password
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - api

  # Nginx (optional - for production)
  nginx:
    image: nginx:alpine
    container_name: dsriding_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - api

volumes:
  postgres_data:
  static_volume:
  media_volume:

