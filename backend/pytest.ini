[pytest]
DJANGO_SETTINGS_MODULE = dressage.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --cov=apps
    --cov-report=term-missing
    --cov-report=html
markers =
    django_db: mark test as requiring database access

