version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: dressage-db
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-dressage_db}
      POSTGRES_USER: ${DATABASE_USER:-dressage_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-changeme123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dressage-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-dressage_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis (for Celery and caching)
  redis:
    image: redis:7-alpine
    container_name: dressage-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - dressage-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Django Backend Application
  backend:
    build:
      context: ./dressage
      dockerfile: Dockerfile
    image: dressage-backend:latest
    container_name: dressage-backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 
                      --workers 4 
                      --threads 2 
                      --timeout 60 
                      --access-logfile - 
                      --error-logfile - 
                      dressage.wsgi:application"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-development-key}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      - DATABASE_ENGINE=django.db.backends.postgresql
      - DATABASE_NAME=${DATABASE_NAME:-dressage_db}
      - DATABASE_USER=${DATABASE_USER:-dressage_user}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-changeme123}
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CORS_ALLOWED_ORIGINS=http://localhost:4200,http://localhost:80
    volumes:
      - ./dressage:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dressage-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Celery Worker (for background tasks)
  celery:
    build:
      context: ./dressage
      dockerfile: Dockerfile
    image: dressage-backend:latest
    container_name: dressage-celery
    command: celery -A dressage worker --loglevel=info
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-development-key}
      - DATABASE_ENGINE=django.db.backends.postgresql
      - DATABASE_NAME=${DATABASE_NAME:-dressage_db}
      - DATABASE_USER=${DATABASE_USER:-dressage_user}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-changeme123}
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - ./dressage:/app
    depends_on:
      - db
      - redis
      - backend
    networks:
      - dressage-network
    restart: unless-stopped

  # Celery Beat (for scheduled tasks)
  celery-beat:
    build:
      context: ./dressage
      dockerfile: Dockerfile
    image: dressage-backend:latest
    container_name: dressage-celery-beat
    command: celery -A dressage beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-development-key}
      - DATABASE_ENGINE=django.db.backends.postgresql
      - DATABASE_NAME=${DATABASE_NAME:-dressage_db}
      - DATABASE_USER=${DATABASE_USER:-dressage_user}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-changeme123}
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - ./dressage:/app
    depends_on:
      - db
      - redis
      - backend
    networks:
      - dressage-network
    restart: unless-stopped

  # Angular Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: dressage-frontend:latest
    container_name: dressage-frontend
    ports:
      - "4200:80"
    networks:
      - dressage-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: dressage-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/mediafiles:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - dressage-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped

# Persistent volumes
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

# Networks
networks:
  dressage-network:
    driver: bridge

